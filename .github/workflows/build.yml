name: Build qjsrht APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Read configuration
      id: config
      run: |
        MODE=$(jq -r '.mode' config.json)
        NETWORK_TYPE=$(jq -r '.network.type' config.json)
        NETWORK_ADDRESS=$(jq -r '.network.address' config.json)
        NETWORK_PORT=$(jq -r '.network.port' config.json)
        APP_NAME=$(jq -r '.app.name' config.json)

        echo "mode=$MODE" >> $GITHUB_OUTPUT
        echo "network_type=$NETWORK_TYPE" >> $GITHUB_OUTPUT
        echo "network_address=$NETWORK_ADDRESS" >> $GITHUB_OUTPUT
        echo "network_port=$NETWORK_PORT" >> $GITHUB_OUTPUT
        echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

        echo "Configuration loaded:"
        echo "  Mode: $MODE"
        echo "  Network Type: $NETWORK_TYPE"
        echo "  Address: $NETWORK_ADDRESS"
        echo "  Port: $NETWORK_PORT"

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Install NDK
      run: |
        echo "y" | sdkmanager "ndk;25.2.9519653"
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential wget git curl jq tor

    # Descargar binarios precompilados de QuickJS
    - name: Download QuickJS binaries for ARM64
      run: |
        mkdir -p app/src/main/assets/arm64
        wget -O app/src/main/assets/arm64/qjs https://github.com/StringManolo/QJSB4A/releases/download/v1.0.16/qjs-arm64-v8a
        chmod +x app/src/main/assets/arm64/qjs

    - name: Download QuickJS binaries for ARM32
      run: |
        mkdir -p app/src/main/assets/arm32
        wget -O app/src/main/assets/arm32/qjs https://github.com/StringManolo/QJSB4A/releases/download/v1.0.16/qjs-armeabi-v7a
        chmod +x app/src/main/assets/arm32/qjs

    # Descargar fuentes de QuickJS (solo para los headers)
    - name: Download QuickJS source
      run: |
        mkdir -p build/quickjs-src
        cd build/quickjs-src
        wget https://bellard.org/quickjs/quickjs-2024-01-13.tar.xz
        tar xf quickjs-2024-01-13.tar.xz --strip-components=1
        # Los headers estarán en build/quickjs-src (quickjs.h, etc.)

    # Compilar qjsNetworkSockets para ARM32
    - name: Clone and compile qjsNetworkSockets for ARM32
      run: |
        mkdir -p build
        cd build
        git clone https://github.com/StringManolo/qjsNetworkSockets.git
        cd qjsNetworkSockets

        export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
        export CC="$TOOLCHAIN/bin/armv7a-linux-androideabi21-clang"
        export STRIP="$TOOLCHAIN/bin/llvm-strip"

        # Compilar usando los headers descargados (ruta corregida: ../quickjs-src)
        $CC -shared -fPIC -o qjsnet.so src/qjs_sockets.c \
          -I../quickjs-src \
          -Os

        $STRIP qjsnet.so
        cp qjsnet.so ../../app/src/main/assets/arm32/

    # Compilar qjsNetworkSockets para ARM64
    - name: Clone and compile qjsNetworkSockets for ARM64
      run: |
        cd build/qjsNetworkSockets

        export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
        export CC="$TOOLCHAIN/bin/aarch64-linux-android21-clang"
        export STRIP="$TOOLCHAIN/bin/llvm-strip"

        # Compilar usando los headers descargados (ruta corregida: ../quickjs-src)
        $CC -shared -fPIC -o qjsnet.so src/qjs_sockets.c \
          -I../quickjs-src \
          -Os

        $STRIP qjsnet.so
        cp qjsnet.so ../../app/src/main/assets/arm64/

    - name: Copy express.js
      run: |
        cp build/qjsNetworkSockets/extra/express.js app/src/main/assets/

    - name: Download Tor binaries for ARM (if onion mode)
      if: steps.config.outputs.network_type == 'onion'
      run: |
        mkdir -p tor-download
        cd tor-download

        # ARM32
        wget https://github.com/StringManolo/TB4A/releases/download/V1.0.0/tor-armeabi-v7a -O ../app/src/main/assets/arm32/tor
        chmod +x ../app/src/main/assets/arm32/tor

        # ARM64
        wget https://github.com/StringManolo/TB4A/releases/download/V1.0.0/tor-arm64-v8a -O ../app/src/main/assets/arm64/tor
        chmod +x ../app/src/main/assets/arm64/tor

    - name: Generate Tor hidden service (if onion mode)
      if: steps.config.outputs.network_type == 'onion'
      run: |
        mkdir -p tor-hs

        cat > tor-hs/torrc << EOF
        SOCKSPort 0
        HiddenServiceDir /tmp/hidden_service
        HiddenServicePort ${{ steps.config.outputs.network_port }} 127.0.0.1:${{ steps.config.outputs.network_port }}
        EOF

        tor -f tor-hs/torrc &
        TOR_PID=$!

        echo "Waiting for Tor to generate hidden service..."
        for i in {1..30}; do
          if [ -f /tmp/hidden_service/hostname ]; then
            break
          fi
          sleep 1
        done

        if [ -f /tmp/hidden_service/hostname ]; then
          ONION_ADDRESS=$(cat /tmp/hidden_service/hostname)
          echo "DEBUG-ONION: $ONION_ADDRESS"
          echo "onion_address=$ONION_ADDRESS" >> $GITHUB_ENV
        fi

        kill $TOR_PID || true

        mkdir -p app/src/main/assets/tor/hidden_service
        cp -r /tmp/hidden_service/* app/src/main/assets/tor/hidden_service/

        cat > app/src/main/assets/tor/torrc << EOF
        SOCKSPort 0
        HiddenServiceDir hidden_service
        HiddenServicePort ${{ steps.config.outputs.network_port }} 127.0.0.1:${{ steps.config.outputs.network_port }}
        EOF

    - name: Copy config.json to assets
      run: cp config.json app/src/main/assets/

    - name: Build APK (Debug)
      if: steps.config.outputs.mode == 'debug'
      run: gradle assembleDebug --stacktrace

    - name: Build APK (Release)
      if: steps.config.outputs.mode == 'production'
      run: gradle assembleRelease --stacktrace

    - name: Upload Debug APK
      if: steps.config.outputs.mode == 'debug'
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      if: steps.config.outputs.mode == 'production'
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Build summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Mode**: ${{ steps.config.outputs.mode }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Network Type**: ${{ steps.config.outputs.network_type }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Address**: ${{ steps.config.outputs.network_address }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Port**: ${{ steps.config.outputs.network_port }}" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.config.outputs.network_type }}" = "onion" ]; then
          echo "- **Onion Address**: ${{ env.onion_address }}" >> $GITHUB_STEP_SUMMARY
        fi
