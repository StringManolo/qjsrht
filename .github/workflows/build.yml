name: Build qjsrht APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04  # Usamos 22.04 para compatibilidad con tu workflow de compilación

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Read configuration
      id: config
      run: |
        MODE=$(jq -r '.mode' config.json)
        NETWORK_TYPE=$(jq -r '.network.type' config.json)
        NETWORK_ADDRESS=$(jq -r '.network.address' config.json)
        NETWORK_PORT=$(jq -r '.network.port' config.json)
        APP_NAME=$(jq -r '.app.name' config.json)

        echo "mode=$MODE" >> $GITHUB_OUTPUT
        echo "network_type=$NETWORK_TYPE" >> $GITHUB_OUTPUT
        echo "network_address=$NETWORK_ADDRESS" >> $GITHUB_OUTPUT
        echo "network_port=$NETWORK_PORT" >> $GITHUB_OUTPUT
        echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Install NDK
      run: |
        echo "y" | sdkmanager "ndk;25.2.9519653"
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential wget git curl jq tor bc

    # Compilar QuickJS para ARM64 (dinámico) con correcciones TLS
    - name: Compile QuickJS for ARM64 (dynamic)
      run: |
        export API=21
        export HOST_TRIPLE="aarch64-linux-android"
        export TLS_ALIGN=64
        export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
        export CC="$TOOLCHAIN/${HOST_TRIPLE}${API}-clang"
        export AR="$TOOLCHAIN/llvm-ar"
        export STRIP="$TOOLCHAIN/llvm-strip"
        export RANLIB="$TOOLCHAIN/llvm-ranlib"

        mkdir -p build/quickjs-arm64
        cd build/quickjs-arm64
        wget https://bellard.org/quickjs/quickjs-2024-01-13.tar.xz
        tar xf quickjs-2024-01-13.tar.xz
        cd quickjs-2024-01-13

        # Compilar nativo primero (para generar qjsc)
        make -j$(nproc)

        # Crear directorio para compilación cruzada
        cd ..
        cp -r quickjs-2024-01-13 quickjs-cross
        cd quickjs-cross

        # Aplicar correcciones de alineación TLS (como en tu workflow)
        echo "Adding __attribute__((aligned(${TLS_ALIGN}))) to __thread variables"
        find . -name '*.[ch]' -exec sed -i 's/\(\b__thread\b\)/__thread __attribute__((aligned('${TLS_ALIGN}')))/g' {} \;

        # Crear archivo de ensamblador para forzar alineación
        cat > tls_force_align.S <<EOF
        .section .tdata,"awT",%progbits
        .p2align $(echo "l(${TLS_ALIGN})/l(2)" | bc -l | cut -d. -f1)
        .globl quickjs_tls_force_align
        .type quickjs_tls_force_align, %object
        .size quickjs_tls_force_align, ${TLS_ALIGN}
        quickjs_tls_force_align:
        .zero ${TLS_ALIGN}
        EOF

        # Compilar el objeto de alineación
        $CC -c tls_force_align.S -o tls_force_align.o

        # Compilar qjs dinámico (sin -static)
        export CFLAGS="-fPIC -O2 -ftls-model=initial-exec -pthread"
        export LDFLAGS="-pthread -Wl,-z,max-page-size=16384 -Wl,-z,common-page-size=16384 -Wl,-z,relro,-z,now"
        make qjs \
          CC="$CC" \
          AR="$AR" \
          QJSC="../quickjs-2024-01-13/qjsc" \
          LDFLAGS="$LDFLAGS" \
          LIBS="tls_force_align.o -lm -ldl" \
          -j$(nproc)

        $STRIP qjs
        mkdir -p ../../../app/src/main/assets/arm64
        cp qjs ../../../app/src/main/assets/arm64/
        chmod +x ../../../app/src/main/assets/arm64/qjs

    # Compilar QuickJS para ARM32 (dinámico)
    - name: Compile QuickJS for ARM32 (dynamic)
      run: |
        export API=21
        export HOST_TRIPLE="armv7a-linux-androideabi"
        export TLS_ALIGN=32
        export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
        export CC="$TOOLCHAIN/${HOST_TRIPLE}${API}-clang"
        export AR="$TOOLCHAIN/llvm-ar"
        export STRIP="$TOOLCHAIN/llvm-strip"
        export RANLIB="$TOOLCHAIN/llvm-ranlib"

        mkdir -p build/quickjs-arm32
        cd build/quickjs-arm32
        wget https://bellard.org/quickjs/quickjs-2024-01-13.tar.xz
        tar xf quickjs-2024-01-13.tar.xz
        cd quickjs-2024-01-13
        make -j$(nproc)

        cd ..
        cp -r quickjs-2024-01-13 quickjs-cross
        cd quickjs-cross

        echo "Adding __attribute__((aligned(${TLS_ALIGN}))) to __thread variables"
        find . -name '*.[ch]' -exec sed -i 's/\(\b__thread\b\)/__thread __attribute__((aligned('${TLS_ALIGN}')))/g' {} \;

        cat > tls_force_align.S <<EOF
        .section .tdata,"awT",%progbits
        .p2align $(echo "l(${TLS_ALIGN})/l(2)" | bc -l | cut -d. -f1)
        .globl quickjs_tls_force_align
        .type quickjs_tls_force_align, %object
        .size quickjs_tls_force_align, ${TLS_ALIGN}
        quickjs_tls_force_align:
        .zero ${TLS_ALIGN}
        EOF

        $CC -c tls_force_align.S -o tls_force_align.o

        export CFLAGS="-fPIC -O2 -ftls-model=initial-exec -pthread"
        export LDFLAGS="-pthread -Wl,-z,max-page-size=16384 -Wl,-z,common-page-size=16384 -Wl,-z,relro,-z,now"
        make qjs \
          CC="$CC" \
          AR="$AR" \
          QJSC="../quickjs-2024-01-13/qjsc" \
          LDFLAGS="$LDFLAGS" \
          LIBS="tls_force_align.o -lm -ldl" \
          -j$(nproc)

        $STRIP qjs
        mkdir -p ../../../app/src/main/assets/arm32
        cp qjs ../../../app/src/main/assets/arm32/
        chmod +x ../../../app/src/main/assets/arm32/qjs

    # Compilar qjsNetworkSockets para ARM32
    - name: Clone and compile qjsNetworkSockets for ARM32
      run: |
        mkdir -p build
        cd build
        git clone https://github.com/StringManolo/qjsNetworkSockets.git
        cd qjsNetworkSockets

        export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
        export CC="$TOOLCHAIN/armv7a-linux-androideabi21-clang"
        export STRIP="$TOOLCHAIN/llvm-strip"

        # Usar headers de la compilación de QuickJS (con las correcciones TLS)
        $CC -shared -fPIC -o qjsnet.so src/qjs_sockets.c \
          -I../../quickjs-arm32/quickjs-cross \
          -Os

        $STRIP qjsnet.so
        cp qjsnet.so ../../app/src/main/assets/arm32/

    # Compilar qjsNetworkSockets para ARM64
    - name: Clone and compile qjsNetworkSockets for ARM64
      run: |
        cd build/qjsNetworkSockets

        export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
        export CC="$TOOLCHAIN/aarch64-linux-android21-clang"
        export STRIP="$TOOLCHAIN/llvm-strip"

        $CC -shared -fPIC -o qjsnet.so src/qjs_sockets.c \
          -I../../quickjs-arm64/quickjs-cross \
          -Os

        $STRIP qjsnet.so
        cp qjsnet.so ../../app/src/main/assets/arm64/

    # Parchear y copiar express.js
    - name: Patch and copy express.js
      run: |
        sed -i 's/network_sockets\.so/qjsnet.so/g' build/qjsNetworkSockets/extra/express.js
        sed -i 's|/dist/||g' build/qjsNetworkSockets/extra/express.js
        cp build/qjsNetworkSockets/extra/express.js app/src/main/assets/express.js

    - name: Download Tor binaries for ARM (if onion mode)
      if: steps.config.outputs.network_type == 'onion'
      run: |
        mkdir -p tor-download
        cd tor-download
        wget https://github.com/StringManolo/TB4A/releases/download/V1.0.0/tor-armeabi-v7a -O ../app/src/main/assets/arm32/tor
        chmod +x ../app/src/main/assets/arm32/tor
        wget https://github.com/StringManolo/TB4A/releases/download/V1.0.0/tor-arm64-v8a -O ../app/src/main/assets/arm64/tor
        chmod +x ../app/src/main/assets/arm64/tor

    - name: Generate Tor hidden service (if onion mode)
      if: steps.config.outputs.network_type == 'onion'
      run: |
        mkdir -p tor-hs
        cat > tor-hs/torrc << EOF
        SOCKSPort 0
        HiddenServiceDir /tmp/hidden_service
        HiddenServicePort ${{ steps.config.outputs.network_port }} 127.0.0.1:${{ steps.config.outputs.network_port }}
        EOF
        tor -f tor-hs/torrc &
        TOR_PID=$!
        echo "Waiting for Tor to generate hidden service..."
        for i in {1..30}; do
          if [ -f /tmp/hidden_service/hostname ]; then break; fi
          sleep 1
        done
        if [ -f /tmp/hidden_service/hostname ]; then
          ONION_ADDRESS=$(cat /tmp/hidden_service/hostname)
          echo "DEBUG-ONION: $ONION_ADDRESS"
          echo "onion_address=$ONION_ADDRESS" >> $GITHUB_ENV
        fi
        kill $TOR_PID || true
        mkdir -p app/src/main/assets/tor/hidden_service
        cp -r /tmp/hidden_service/* app/src/main/assets/tor/hidden_service/
        cat > app/src/main/assets/tor/torrc << EOF
        SOCKSPort 0
        HiddenServiceDir hidden_service
        HiddenServicePort ${{ steps.config.outputs.network_port }} 127.0.0.1:${{ steps.config.outputs.network_port }}
        EOF

    - name: Copy config.json to assets
      run: cp config.json app/src/main/assets/

    - name: Build APK (Debug)
      if: steps.config.outputs.mode == 'debug'
      run: gradle assembleDebug --stacktrace

    - name: Build APK (Release)
      if: steps.config.outputs.mode == 'production'
      run: gradle assembleRelease --stacktrace

    - name: Upload Debug APK
      if: steps.config.outputs.mode == 'debug'
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      if: steps.config.outputs.mode == 'production'
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Build summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Mode**: ${{ steps.config.outputs.mode }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Network Type**: ${{ steps.config.outputs.network_type }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Address**: ${{ steps.config.outputs.network_address }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Port**: ${{ steps.config.outputs.network_port }}" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.config.outputs.network_type }}" = "onion" ]; then
          echo "- **Onion Address**: ${{ env.onion_address }}" >> $GITHUB_STEP_SUMMARY
        fi
