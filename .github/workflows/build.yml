name: Build qjsrht APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Read configuration
      id: config
      run: |
        MODE=$(jq -r '.mode' config.json)
        NETWORK_TYPE=$(jq -r '.network.type' config.json)
        NETWORK_ADDRESS=$(jq -r '.network.address' config.json)
        NETWORK_PORT=$(jq -r '.network.port' config.json)
        APP_NAME=$(jq -r '.app.name' config.json)

        echo "mode=$MODE" >> $GITHUB_OUTPUT
        echo "network_type=$NETWORK_TYPE" >> $GITHUB_OUTPUT
        echo "network_address=$NETWORK_ADDRESS" >> $GITHUB_OUTPUT
        echo "network_port=$NETWORK_PORT" >> $GITHUB_OUTPUT
        echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.5'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Install NDK
      run: |
        echo "y" | sdkmanager "ndk;25.2.9519653"
        echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential wget git curl jq tor bc

    # Descargar fuente de QuickJS (una vez)
    - name: Download QuickJS source
      run: |
        mkdir -p build/quickjs-src
        cd build/quickjs-src
        wget https://bellard.org/quickjs/quickjs-2024-01-13.tar.xz
        tar xf quickjs-2024-01-13.tar.xz --strip-components=1
        echo "Contenido de build/quickjs-src:"
        ls -la

    # Compilar QuickJS para ARM64 (dinámico)
    - name: Compile QuickJS for ARM64
      run: |
        export API=21
        export HOST_TRIPLE="aarch64-linux-android"
        export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
        export CC="$TOOLCHAIN/${HOST_TRIPLE}${API}-clang"
        export AR="$TOOLCHAIN/llvm-ar"
        export STRIP="$TOOLCHAIN/llvm-strip"
        export RANLIB="$TOOLCHAIN/llvm-ranlib"

        cd build/quickjs-src
        make -j$(nproc) qjsc

        mkdir -p ../quickjs-cross-arm64
        cp -r . ../quickjs-cross-arm64
        cd ../quickjs-cross-arm64
        make clean

        make qjs \
          CC="$CC" \
          AR="$AR" \
          RANLIB="$RANLIB" \
          QJSC="../quickjs-src/qjsc" \
          LDFLAGS="-pthread" \
          LIBS="-lm -ldl" \
          -j$(nproc)

        $STRIP qjs
        mkdir -p ../../app/src/main/assets/arm64
        cp qjs ../../app/src/main/assets/arm64/
        chmod +x ../../app/src/main/assets/arm64/qjs

    # Compilar QuickJS para ARM32 (dinámico)
    - name: Compile QuickJS for ARM32
      run: |
        export API=21
        export HOST_TRIPLE="armv7a-linux-androideabi"
        export TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
        export CC="$TOOLCHAIN/${HOST_TRIPLE}${API}-clang"
        export AR="$TOOLCHAIN/llvm-ar"
        export STRIP="$TOOLCHAIN/llvm-strip"
        export RANLIB="$TOOLCHAIN/llvm-ranlib"

        mkdir -p build/quickjs-cross-arm32
        cp -r build/quickjs-src/* build/quickjs-cross-arm32/
        cd build/quickjs-cross-arm32
        make clean

        make qjs \
          CC="$CC" \
          AR="$AR" \
          RANLIB="$RANLIB" \
          QJSC="../quickjs-src/qjsc" \
          LDFLAGS="-pthread" \
          LIBS="-lm -ldl" \
          -j$(nproc)

        $STRIP qjs
        mkdir -p ../../app/src/main/assets/arm32
        cp qjs ../../app/src/main/assets/arm32/
        chmod +x ../../app/src/main/assets/arm32/qjs

    # Clonar qjsNetworkSockets (solo una vez)
    - name: Clone qjsNetworkSockets
      run: |
        mkdir -p build
        cd build
        git clone https://github.com/StringManolo/qjsNetworkSockets.git

    # Verificar que quickjs.h existe antes de compilar
    - name: Verify quickjs.h location
      run: |
        echo "Contenido de build/quickjs-src:"
        ls -la build/quickjs-src/
        echo "Buscando quickjs.h:"
        find build -name "quickjs.h" || echo "No encontrado"

    # Compilar qjsNetworkSockets para ARM32 (con ruta absoluta)
    - name: Compile qjsNetworkSockets for ARM32
      run: |
        cd build/qjsNetworkSockets

        export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
        export CC="$TOOLCHAIN/armv7a-linux-androideabi21-clang"
        export STRIP="$TOOLCHAIN/llvm-strip"

        # Usar ruta absoluta para los headers
        $CC -shared -fPIC -o qjsnet.so src/qjs_sockets.c \
          -I$GITHUB_WORKSPACE/build/quickjs-src \
          -Os

        $STRIP qjsnet.so
        cp qjsnet.so $GITHUB_WORKSPACE/app/src/main/assets/arm32/

    # Compilar qjsNetworkSockets para ARM64 (con ruta absoluta)
    - name: Compile qjsNetworkSockets for ARM64
      run: |
        cd build/qjsNetworkSockets

        export TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
        export CC="$TOOLCHAIN/aarch64-linux-android21-clang"
        export STRIP="$TOOLCHAIN/llvm-strip"

        $CC -shared -fPIC -o qjsnet.so src/qjs_sockets.c \
          -I$GITHUB_WORKSPACE/build/quickjs-src \
          -Os

        $STRIP qjsnet.so
        cp qjsnet.so $GITHUB_WORKSPACE/app/src/main/assets/arm64/

    # Parchear express.js con el import correcto
    - name: Patch express.js import
      run: |
        sed -i 's|import sockets from '\''../dist/network_sockets.so'\'';|import sockets from '\''./qjsnet.so'\'';|' build/qjsNetworkSockets/extra/express.js
        cp build/qjsNetworkSockets/extra/express.js app/src/main/assets/express.js

    - name: Download Tor binaries for ARM (if onion mode)
      if: steps.config.outputs.network_type == 'onion'
      run: |
        mkdir -p tor-download
        cd tor-download
        wget https://github.com/StringManolo/TB4A/releases/download/V1.0.0/tor-armeabi-v7a -O ../app/src/main/assets/arm32/tor
        chmod +x ../app/src/main/assets/arm32/tor
        wget https://github.com/StringManolo/TB4A/releases/download/V1.0.0/tor-arm64-v8a -O ../app/src/main/assets/arm64/tor
        chmod +x ../app/src/main/assets/arm64/tor

    - name: Generate Tor hidden service (if onion mode)
      if: steps.config.outputs.network_type == 'onion'
      run: |
        mkdir -p tor-hs
        cat > tor-hs/torrc << EOF
        SOCKSPort 0
        HiddenServiceDir /tmp/hidden_service
        HiddenServicePort ${{ steps.config.outputs.network_port }} 127.0.0.1:${{ steps.config.outputs.network_port }}
        EOF
        tor -f tor-hs/torrc &
        TOR_PID=$!
        echo "Waiting for Tor to generate hidden service..."
        for i in {1..30}; do
          if [ -f /tmp/hidden_service/hostname ]; then break; fi
          sleep 1
        done
        if [ -f /tmp/hidden_service/hostname ]; then
          ONION_ADDRESS=$(cat /tmp/hidden_service/hostname)
          echo "DEBUG-ONION: $ONION_ADDRESS"
          echo "onion_address=$ONION_ADDRESS" >> $GITHUB_ENV
        fi
        kill $TOR_PID || true
        mkdir -p app/src/main/assets/tor/hidden_service
        cp -r /tmp/hidden_service/* app/src/main/assets/tor/hidden_service/
        cat > app/src/main/assets/tor/torrc << EOF
        SOCKSPort 0
        HiddenServiceDir hidden_service
        HiddenServicePort ${{ steps.config.outputs.network_port }} 127.0.0.1:${{ steps.config.outputs.network_port }}
        EOF

    - name: Copy config.json to assets
      run: cp config.json app/src/main/assets/

    # Asegurar que server.js es el local (con marcador) e inyectar token
    - name: Copy local server.js to assets (overwrite any existing)
      run: |
        # Si server.js está en la raíz del repo, cópialo. Ajusta la ruta si es necesario.
        cp app/src/main/assets/server.js app/src/main/assets/server.js.backup || true
        # En realidad, si ya está en assets, no hace falta copiar, pero lo dejamos por claridad.
        # Si tu server.js está en otro lado, cambia la ruta.
        echo "Usando server.js local"
        ls -la app/src/main/assets/server.js

    - name: Inject auth token from secrets
      run: |
        sed -i "s/__AUTH_TOKEN__/${{ secrets.AUTH_TOKEN }}/g" app/src/main/assets/server.js
        echo "Token inyectado correctamente"

    - name: Build APK (Debug)
      if: steps.config.outputs.mode == 'debug'
      run: gradle assembleDebug --stacktrace

    - name: Build APK (Release)
      if: steps.config.outputs.mode == 'production'
      run: gradle assembleRelease --stacktrace

    - name: Upload Debug APK
      if: steps.config.outputs.mode == 'debug'
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      if: steps.config.outputs.mode == 'production'
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Build summary
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Mode**: ${{ steps.config.outputs.mode }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Network Type**: ${{ steps.config.outputs.network_type }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Address**: ${{ steps.config.outputs.network_address }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Port**: ${{ steps.config.outputs.network_port }}" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.config.outputs.network_type }}" = "onion" ]; then
          echo "- **Onion Address**: ${{ env.onion_address }}" >> $GITHUB_STEP_SUMMARY
        fi
